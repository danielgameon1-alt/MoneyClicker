<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magnata das Moedas: Corrigido</title>
    <style>
        body { background: #eef2f3; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; user-select: none; }
        #header { background: linear-gradient(135deg, #ffcc00, #ff9900); padding: 20px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 20; }
        #moedas { font-size: 40px; font-weight: bold; }
        #mps { font-size: 18px; opacity: 0.9; }

        #moeda-principal { 
            width: 130px; height: 130px; background: gold; border-radius: 50%; 
            margin: 30px auto; border: 8px solid #ccaa00; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 55px; box-shadow: 0 10px 0 #aa8800; transition: 0.05s;
            position: relative; -webkit-tap-highlight-color: transparent;
        }
        #moeda-principal:active { transform: translateY(7px) scale(0.95); box-shadow: 0 3px 0 #aa8800; }

        .loja { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; padding-bottom: 150px; }
        .item { background: white; border-radius: 15px; padding: 12px; width: 95%; max-width: 380px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .info { text-align: left; font-size: 14px; }
        .info b { color: #27ae60; }
        
        .btn-comprar { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-comprar:disabled { background: #bdc3c7; opacity: 0.7; cursor: not-allowed; }

        #aba-conquistas {
            position: fixed; bottom: -75vh; left: 0; width: 100%; height: 70vh;
            background: white; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            transition: 0.4s; z-index: 30;
        }
        #aba-conquistas.aberta { bottom: 0; }
        .puxador { width: 50px; height: 5px; background: #ccc; margin: 15px auto; border-radius: 10px; }
        .lista-conquistas { padding: 20px; overflow-y: auto; height: 80%; }
        .conquista { display: flex; align-items: center; background: #f9f9f9; margin-bottom: 10px; padding: 10px; border-radius: 10px; opacity: 0.4; }
        .conquista.feita { opacity: 1; border-left: 5px solid gold; background: #fffde7; }

        #tela-vitoria {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200; color: white;
        }
        #btn-jogar-novamente { background: gold; color: black; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; font-weight: bold; margin-top: 20px; cursor: pointer; }

        #btn-conquistas { background: #34495e; color: white; border: none; padding: 12px 25px; border-radius: 30px; margin-top: 10px; font-weight: bold; }
        #notificacao { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #333; color: gold; padding: 15px 25px; border-radius: 50px; z-index: 100; border: 2px solid gold; transition: 0.5s; }
        
        .particula { position: absolute; pointer-events: none; animation: voar 0.8s forwards; font-size: 20px; z-index: 100; }
        @keyframes voar { 0% { opacity: 1; } 100% { transform: translateY(-120px) translateX(var(--x)); opacity: 0; } }
    </style>
</head>
<body>

<div id="notificacao">🏆 Conquista Desbloqueada!</div>

<div id="tela-vitoria">
    <h1 style="color: gold; font-size: 40px;">👑 PARABÉNS!</h1>
    <p style="font-size: 20px;">Você venceu e se tornou o maior magnata!</p>
    <button id="btn-jogar-novamente" onclick="reiniciarJogo()">Jogar Novamente</button>
</div>

<div id="header">
    <div id="moedas">💰 0</div>
    <div id="mps">0 /s</div>
</div>

<div id="moeda-principal" onclick="clicar(event)">🪙</div>

<button id="btn-conquistas" onclick="abrirConquistas()">Ver Conquistas 🏆</button>

<div class="loja">
    <div class="item">
        <div class="info">Ajudante (+1/s)<br><b>Custo: 15</b></div>
        <button class="btn-comprar" id="btn-comprar-15" onclick="comprar(15, 1)">Comprar</button>
    </div>
    <div class="item">
        <div class="info">Fazenda (+10/s)<br><b>Custo: 100</b></div>
        <button class="btn-comprar" id="btn-comprar-100" onclick="comprar(100, 10)">Comprar</button>
    </div>
    <div class="item">
        <div class="info">Fábrica (+50/s)<br><b>Custo: 500</b></div>
        <button class="btn-comprar" id="btn-comprar-500" onclick="comprar(500, 50)">Comprar</button>
    </div>
    <div class="item">
        <div class="info">Banco (+350/s)<br><b>Custo: 1.000</b></div>
        <button class="btn-comprar" id="btn-comprar-1000" onclick="comprar(1000, 350)">Comprar</button>
    </div>
    
    <div class="item" id="item-zerar" style="border: 2px solid gold; background: #fffde7;">
        <div class="info"><b>ZERAR JOGO 🏆</b><br><small>Custo: 1.000.000</small></div>
        <button class="btn-comprar" style="background: gold; color: black;" id="btn-comprar-1000000" onclick="comprarZerar()">ZERAR!</button>
    </div>

    <button onclick="resetarTudo()" style="margin-top: 30px; background: none; border: none; color: #888; text-decoration: underline;">Reiniciar progresso total</button>
</div>

<div id="aba-conquistas">
    <div class="puxador" onclick="abrirConquistas()"></div>
    <button onclick="abrirConquistas()" style="position: absolute; right: 20px; top: 15px; background: #ddd; border: none; border-radius: 50%; width: 35px; height: 35px; font-weight: bold;">✕</button>
    <h3>Minhas Conquistas</h3>
    <div class="lista-conquistas" id="lista-conquistas"></div>
</div>

<script>
    let moedas = 0;
    let mps = 0;
    let conquistas = [];

    const custosPossiveis = [15, 100, 500, 1000, 1000000];

    const conquistasDef = [
        { id: 'c1', nome: 'Iniciante', desc: 'Chegou a 100 moedas', meta: 100 },
        { id: 'c2', nome: 'Empresário', desc: 'Chegou a 1.000 moedas', meta: 1000 },
        { id: 'c3', nome: 'Bancário', desc: 'Ganhou 350 moedas por segundo', meta: 350 },
        { id: 'c4', nome: 'O Magnata', desc: 'Chegou a 1 milhão de moedas', meta: 1000000 }
    ];

    function atualizarTela() {
        document.getElementById('moedas').innerText = '💰 ' + Math.floor(moedas);
        document.getElementById('mps').innerText = mps + ' por segundo';
        
        custosPossiveis.forEach(custo => {
            const btn = document.getElementById('btn-comprar-' + custo);
            if (btn) {
                btn.disabled = moedas < custo;
            }
        });

        conquistasDef.forEach(c => {
            if (!conquistas.includes(c.id)) {
                let valor = c.id === 'c3' ? mps : moedas;
                if (valor >= c.meta) {
                    conquistas.push(c.id);
                    notificar(c.nome);
                    renderConquistas();
                    salvar();
                }
            }
        });
    }

    function clicar(e) {
        moedas++;
        criarParticula(e.clientX, e.clientY);
        atualizarTela();
    }

    function comprar(custo, valor) {
        if (moedas >= custo) {
            moedas -= custo;
            mps += valor;
            atualizarTela();
            salvar();
        }
    }

    function comprarZerar() {
        if (moedas >= 1000000) {
            moedas -= 1000000;
            salvar();
            document.getElementById('tela-vitoria').style.display = 'flex';
        }
    }

    function reiniciarJogo() {
        localStorage.clear();
        location.reload();
    }

    function criarParticula(x, y) {
        const p = document.createElement('div');
        p.className = 'particula'; p.innerText = '💰';
        p.style.left = (x || window.innerWidth/2) + 'px'; 
        p.style.top = (y || window.innerHeight/2) + 'px';
        p.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    function notificar(nome) {
        const n = document.getElementById('notificacao');
        n.innerText = "🏆 Conquista: " + nome;
        n.style.top = "20px";
        setTimeout(() => n.style.top = "-100px", 3000);
    }

    function abrirConquistas() {
        document.getElementById('aba-conquistas').classList.toggle('aberta');
        renderConquistas();
    }

    function renderConquistas() {
        const lista = document.getElementById('lista-conquistas');
        lista.innerHTML = conquistasDef.map(c => `
            <div class="conquista ${conquistas.includes(c.id) ? 'feita' : ''}">
                <div style="font-size:25px; margin-right:15px">${conquistas.includes(c.id) ? '✅' : '🔒'}</div>
                <div style="text-align:left"><b>${c.nome}</b><br><small>${c.desc}</small></div>
            </div>
        `).join('');
    }

    function salvar() {
        const save = { moedas, mps, conquistas };
        localStorage.setItem('save_magnata_v3', JSON.stringify(save));
    }

    function carregar() {
        const dados = JSON.parse(localStorage.getItem('save_magnata_v3'));
        if (dados) {
            moedas = dados.moedas;
            mps = dados.mps;
            conquistas = dados.conquistas || [];
        }
        atualizarTela();
    }

    function resetarTudo() {
        if(confirm("Deseja apagar tudo e recomeçar agora?")) {
            localStorage.clear();
            location.reload();
        }
    }

    setInterval(() => {
        if (mps > 0) {
            moedas += mps;
            atualizarTela();
            salvar();
        }
    }, 1000);

    carregar();
</script>

</body>
</html>
